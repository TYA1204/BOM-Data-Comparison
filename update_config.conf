# ============================================================================
# BOM Comparison — 自动更新配置文件
# ============================================================================
# 说明: 修改此文件后，auto_update.sh 将在下次运行时自动加载
# 格式: KEY=VALUE (等号两边不要加空格)
# ============================================================================

# ---------------------------------------------------------------------------
# 更新源配置
# ---------------------------------------------------------------------------

# 更新源类型: package | git | http
#   package - 从 packages/ 目录读取 tar.gz 更新包（推荐，默认）
#   git     - 从 Git 仓库拉取最新代码（需 code/ 目录为 Git 仓库）
#   http    - 从指定 URL 下载更新包
UPDATE_SOURCE=package

# Git 分支名 (UPDATE_SOURCE=git 时生效)
GIT_BRANCH=main

# HTTP 下载地址 (UPDATE_SOURCE=http 时生效)
UPDATE_URL=

# ---------------------------------------------------------------------------
# 备份策略
# ---------------------------------------------------------------------------

# 保留的备份数量上限 (超过后自动清理旧备份)
BACKUP_MAX_COUNT=10

# ---------------------------------------------------------------------------
# 更新行为
# ---------------------------------------------------------------------------

# 更新成功后是否自动清理 packages/ 中的更新包
#   true  - 自动删除已应用的包
#   false - 保留已应用的包（会记录在 .applied_packages 中防止重复应用）
AUTO_CLEANUP_PACKAGES=true

# ---------------------------------------------------------------------------
# 超时设置
# ---------------------------------------------------------------------------

# 停止服务最大等待时间（秒）
STOP_TIMEOUT=10

# 启动服务最大等待时间（秒）
START_TIMEOUT=15

# ---------------------------------------------------------------------------
# 验证设置
# ---------------------------------------------------------------------------

# 健康检查重试次数
HEALTH_CHECK_RETRIES=3

# 健康检查重试间隔（秒）
HEALTH_CHECK_INTERVAL=3

# ---------------------------------------------------------------------------
# 通知设置
# ---------------------------------------------------------------------------

# Webhook 通知地址（可选，留空则不发送通知）
# 支持企业微信机器人、钉钉机器人等 webhook
# 示例: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx
WEBHOOK_URL=

# ---------------------------------------------------------------------------
# 定时任务设置
# ---------------------------------------------------------------------------

# Cron 表达式 (schedule install 时生效)
# 默认: 每天凌晨 3:00
CRON_SCHEDULE="0 3 * * *"

# ---------------------------------------------------------------------------
# 自定义钩子 (高级)
# ---------------------------------------------------------------------------

# 更新前执行的脚本（可选，在备份之后、停服之前执行）
# PRE_UPDATE_HOOK=

# 更新后执行的脚本（可选，在验证通过之后执行）
# POST_UPDATE_HOOK=

# ---------------------------------------------------------------------------
# Python 缓存控制
# ---------------------------------------------------------------------------

# 禁止 Python 生成 .pyc 字节码文件 (推荐: true)
#   true  - 设置 PYTHONDONTWRITEBYTECODE=1，从根源避免缓存问题
#   false - 允许生成 .pyc（不推荐，可能导致旧模块缓存残留）
PYTHON_NO_BYTECODE=true

# 启动前是否强制检查 __pycache__ 残留 (推荐: true)
#   true  - 发现缓存残留时阻止启动并告警
#   false - 仅告警但不阻止启动
PYCACHE_CHECK_ENFORCE=true

# 停止服务时是否自动清除 __pycache__ (推荐: true)
#   true  - stop.sh 自动清除所有缓存目录
#   false - 不自动清除
PYCACHE_CLEAN_ON_STOP=true

# 部署后健康检查脚本路径 (相对于项目根目录)
# 留空则使用默认脚本 health_check.sh
HEALTH_CHECK_SCRIPT=health_check.sh
