<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BOM差异分析工具{% endblock %}</title>
    <meta name="description" content="专业的 BOM差异分析工具，支持 Excel 导入、智能差异识别、报告导出">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<!-- Skip Link -->
<a href="#main-content" class="skip-link">跳到主要内容</a>

<!-- Navigation Bar -->
<nav class="nav" role="navigation" aria-label="主导航">
    <div class="nav__inner">
        <a href="/" class="nav__brand" aria-label="BOM差异分析工具 首页">
            <span class="nav__brand-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </span>
            BOM差异分析工具
        </a>

        <!-- Desktop Links -->
        <ul class="nav__links" role="menubar">
            <li role="none">
                <a href="/" class="nav__link {{ 'nav__link--active' if request.path == '/' }}" role="menuitem">
                    <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    首页
                </a>
            </li>
            <li role="none">
                <a href="/upload" class="nav__link {{ 'nav__link--active' if request.path.startswith('/upload') }}" role="menuitem">
                    <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    上传BOM
                </a>
            </li>
            <li role="none">
                <a href="/compare" class="nav__link {{ 'nav__link--active' if request.path.startswith('/compare') }}" role="menuitem">
                    <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
                    开始比对
                </a>
            </li>
            <li role="none">
                <a href="/sop" class="nav__link {{ 'nav__link--active' if request.path == '/sop' }}" role="menuitem" title="BOM核对保姆级操作指南">
                    <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    操作指南
                </a>
            </li>
        </ul>

        <!-- Mobile Menu Toggle -->
        <button class="nav__toggle" aria-label="打开菜单" aria-expanded="false" aria-controls="mobile-menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </div>

    <!-- Mobile Menu Panel -->
    <div class="nav__mobile" id="mobile-menu">
        <div class="nav__mobile-panel" role="menu">
            <a href="/" class="nav__mobile-link {{ 'nav__mobile-link--active' if request.path == '/' }}" role="menuitem">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                首页
            </a>
            <a href="/upload" class="nav__mobile-link {{ 'nav__mobile-link--active' if request.path.startswith('/upload') }}" role="menuitem">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                上传BOM
            </a>
            <a href="/compare" class="nav__mobile-link {{ 'nav__mobile-link--active' if request.path.startswith('/compare') }}" role="menuitem">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
                开始比对
            </a>
            <a href="/sop" class="nav__mobile-link {{ 'nav__mobile-link--active' if request.path == '/sop' }}" role="menuitem" title="BOM核对保姆级操作指南">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                操作指南
            </a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main id="main-content" class="flex-1">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="border-t border-slate-200 bg-white mt-auto">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-slate-400">
        <span>BOM差异分析工具 v1.0</span>
        <span>数据仅存储于本地 · 安全可靠</span>
    </div>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
